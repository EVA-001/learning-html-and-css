<!--create the amazon add to cart button-->

<!--now create a transition that changes the color as
you hover over-->

<button class="add-to-cart-button">
    Add to Cart
</button>

<style>
    .add-to-cart-button{
        background-color: rgb(255, 216, 20);
        color: black;
        border: none;
        height: 30px;
        width: 150px;
        border-radius: 15px;
        cursor: pointer;
        transition: background-color 0.15s;
    }
    .add-to-cart-button:hover{
        background-color: rgb(244, 204, 5);
    }
</style>
